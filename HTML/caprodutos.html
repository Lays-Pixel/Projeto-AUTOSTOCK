<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Produtos</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../CSS/caprodutos.css">
</head>
<body>

  <div class="container">
    <header>
      <h2>Cadastro de produtos</h2>
      <span class="logo">AUTOSTOCK</span>
    </header>

    <form>
      <div class="field">
        <label>Produto:</label>
        <select>
          <option>Selecione</option>
          <option value="EPI's">EPI's</option>
          <option value="Uniformes">Uniformes</option>
        </select>
      </div>

      <div class="field">
        <label>Quantidade de produtos:</label>
        <input type="number" placeholder="0">
      </div>

      <button type="submit" onclick="window.location.href='concluido.html';">CADASTRAR</button>
    </form>
  </div>

  <script src="../JS/caprodutos.js"></script> 
</body>
</html>
