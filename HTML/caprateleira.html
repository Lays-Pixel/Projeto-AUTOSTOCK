<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Prateleiras</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/capratileira.css">
</head>
<body>

    <div class="container">
        <h2>Cadastro de prateleiras</h2>

        <div class="form-group">
            <label for="capacidade">Capacidade das prateleiras:</label>
            <select id="capacidade">
                <option value="">Selecione</option>
                <option value="50">50 unidades</option>
                <option value="100">100 unidades</option>
                <option value="200">200 unidades</option>
                <option value="200">300 unidades</option>
            </select>
        </div>

        <div class="form-group">
            <label for="identificação">Identificação da nova prateleira:</label>
            <input type="text" id="identificação">
        </div>

        <div class="form-group">
            <label for="stts"> Status da nova prateleira:</label>
            <select id="stts">
            <option value="">Selecione</option>
            <option value="Livre">Livre</option>
            <option value=" Parcialmente Completa"> Parcialmente Completa</option>
            <option value="Completa">Completa</option>

            </select>
        </div>

        <button onclick="cadastrar()">CADASTRAR</button>
    </div>

    <script src="../js/capratileira.js"></script>
</body> 
</html>
